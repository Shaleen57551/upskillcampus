<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ServiceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <a href="../index.html" class="text-decoration-none h4 fw-bold text-dark">
                                <i class="fa-solid fa-layer-group text-primary me-2"></i>ServiceHub
                            </a>
                        </div>
                        <h3 class="auth-title fw-bold">Welcome Back</h3>
                        <p class="text-center text-muted mb-4">Log in to manage your services and bookings.</p>
                        
                        <div id="loginAlert" class="alert alert-danger d-none rounded-3 shadow-sm border-0"></div>
                        
                        <form id="loginForm">
                            <div class="form-floating mb-3 shadow-sm rounded-3">
                                <input type="text" class="form-control" id="username" placeholder="Username" required>
                                <label for="username"><i class="fa-regular fa-user me-2 text-muted"></i>Username</label>
                            </div>
                            <div class="form-floating mb-4 shadow-sm rounded-3">
                                <input type="password" class="form-control" id="password" placeholder="Password" required>
                                <label for="password"><i class="fa-solid fa-lock me-2 text-muted"></i>Password</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fs-5 shadow-sm fw-bold">Sign In</button>
                        </form>
                        
                        <div class="mt-4 text-center">
                            <p class="text-muted">Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Create one</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>

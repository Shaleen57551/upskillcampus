<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ServiceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-6">
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <a href="../index.html" class="text-decoration-none h4 fw-bold text-dark">
                                <i class="fa-solid fa-layer-group text-primary me-2"></i>ServiceHub
                            </a>
                        </div>
                        <h3 class="auth-title fw-bold">Create an Account</h3>
                        <p class="text-center text-muted mb-4">Join our community of professionals and customers.</p>
                        
                        <div id="registerAlert" class="alert alert-danger d-none rounded-3 shadow-sm border-0"></div>
                        
                        <form id="registerForm">
                            <div class="form-floating mb-3 shadow-sm rounded-3">
                                <input type="text" class="form-control" id="username" placeholder="Username" required minlength="3">
                                <label for="username"><i class="fa-regular fa-user me-2 text-muted"></i>Username</label>
                            </div>
                            <div class="form-floating mb-3 shadow-sm rounded-3">
                                <input type="email" class="form-control" id="email" placeholder="Email" required>
                                <label for="email"><i class="fa-regular fa-envelope me-2 text-muted"></i>Email Address</label>
                            </div>
                            <div class="form-floating mb-3 shadow-sm rounded-3">
                                <input type="password" class="form-control" id="password" placeholder="Password" required minlength="6">
                                <label for="password"><i class="fa-solid fa-lock me-2 text-muted"></i>Password</label>
                            </div>
                            <div class="form-floating mb-4 shadow-sm rounded-3">
                                <select class="form-select" id="role" required>
                                    <option value="customer">I am looking for services (Customer)</option>
                                    <option value="merchant">I want to offer services (Merchant)</option>
                                </select>
                                <label for="role"><i class="fa-solid fa-briefcase me-2 text-muted"></i>Account Type</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fs-5 shadow-sm fw-bold">Sign Up Now</button>
                        </form>
                        
                        <div class="mt-4 text-center">
                            <p class="text-muted">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log in</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>

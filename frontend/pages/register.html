<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ServiceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h3 class="text-center mb-4">Register for ServiceHub</h3>
                <div id="registerAlert" class="alert alert-danger d-none"></div>
                <form id="registerForm">
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" id="username" class="form-control" required minlength="3">
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label>Register As</label>
                        <select id="role" class="form-select" required>
                            <option value="customer">Customer</option>
                            <option value="merchant">Service Provider (Merchant)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="login.html">Already have an account? Login here.</a>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>
